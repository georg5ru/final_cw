name: CI/CD

on:
  push:
    branches:
      - "**"

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          POSTGRES_DB: ""
        run: |
          python manage.py test

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: |
          ruff check .

  docker_build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for compose
        run: |
          cp .env.example .env
          echo "SECRET_KEY=ci-build-only-not-for-prod" >> .env
          echo "POSTGRES_PASSWORD=ci-build-only" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Compose build
        run: |
          docker compose -f docker-compose.yaml build

  deploy:
    name: Deploy (server)
    runs-on: ubuntu-latest
    needs: [tests, lint, docker_build]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.PROJECT_DIR }}
            git fetch --all
            git checkout master
            git pull
            docker compose down || docker-compose down
            docker compose up -d --build || docker-compose up -d --build
            docker compose run --rm backend python manage.py migrate || docker-compose run --rm backend python manage.py migrate
